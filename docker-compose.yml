version: '3.8'

services:
  # Service de la base de données
  postgres:
    image: postgres:15-alpine
    container_name: lpo_db_postgres
    restart: always
    environment:
      POSTGRES_USER: user_lpo
      POSTGRES_PASSWORD: password_lpo
      POSTGRES_DB: lpo_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Optionnel : Interface graphique pour voir tes données (pgAdmin)
  pgadmin:
    image: dpage/pgadmin4
    container_name: lpo_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@lpo.fr
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data: